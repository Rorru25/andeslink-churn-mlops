services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: andeslink-api
    command:
      - python
      - -m
      - uvicorn
      - app.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: andeslink-streamlit
    command:
      - python
      - -m
      - streamlit
      - run
      - app/streamlit_app/app.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped